<aside class="fixed left-0 top-0 z-50 flex h-full w-64 flex-col border-r border-slate-100 bg-white px-4 py-6 dark:bg-slate-900">
  <div class="mb-8 flex items-center gap-3 px-2">
    <div class="flex h-8 w-8 items-center justify-center rounded bg-primary">
      <span class="material-symbols-outlined text-xl text-white" style="font-variation-settings: 'FILL' 1">dataset</span>
    </div>
    <div>
      <h1 class="text-xl font-black leading-none text-slate-900 dark:text-white">SalesFlow</h1>
      <p class="mt-1 text-[10px] font-bold uppercase tracking-widest text-slate-400">Enterprise CRM</p>
    </div>
  </div>

  <button class="mb-6 flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-4 py-3 text-sm font-bold text-white shadow-sm transition-all hover:opacity-90" type="button">
    <span class="material-symbols-outlined text-sm">add_circle</span>
    Add New Lead
  </button>

  <nav class="flex-1 space-y-1">
    <a
      class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50"
      routerLink="/dashboard/overview"
      routerLinkActive="bg-green-600 text-white shadow-sm"
    >
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">dashboard</span>
      <span class="text-sm font-medium">Dashboard</span>
    </a>

    <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50" href="#">
      <span class="material-symbols-outlined">person</span>
      <span class="text-sm font-medium">Contacts</span>
    </a>

    <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50" href="#">
      <span class="material-symbols-outlined">business</span>
      <span class="text-sm font-medium">Companies</span>
    </a>

    <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50" href="#">
      <span class="material-symbols-outlined">bar_chart</span>
      <span class="text-sm font-medium">Reports</span>
    </a>

    <a
      class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50"
      routerLink="/dashboard/settings"
      routerLinkActive="bg-green-600 text-white shadow-sm"
    >
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span>
      <span class="text-sm font-medium">Settings</span>
    </a>
  </nav>

  <div class="mt-auto space-y-1 border-t border-slate-100 pt-4 dark:border-slate-800">
    <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50" href="#">
      <span class="material-symbols-outlined">help</span>
      <span class="text-sm font-medium">Help</span>
    </a>

    <button class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-slate-600 transition-all duration-200 ease-in-out hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-800/50" type="button" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span class="text-sm font-medium">Logout</span>
    </button>
  </div>
</aside>

<header class="fixed left-64 right-0 top-0 z-40 flex h-16 items-center justify-between border-b border-slate-100 bg-white/80 px-8 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/80">
  <div class="max-w-md flex-1">
    <div class="group relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 transition-colors group-focus-within:text-primary">search</span>
      <input class="w-full rounded-lg border-transparent bg-slate-50 py-2 pl-10 pr-4 text-sm transition-all focus:border-primary focus:bg-white focus:ring-0" placeholder="Search..." type="text" />
    </div>
  </div>

  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4 text-slate-500">
      <button class="flex items-center transition-colors hover:text-primary" type="button">
        <span class="material-symbols-outlined">notifications</span>
      </button>
    </div>

    <div class="mx-2 h-8 w-px bg-slate-100"></div>

    <div class="group flex items-center gap-3">
      <div class="hidden text-right sm:block">
        <p class="text-sm font-semibold leading-none text-slate-900">{{ user?.fullName || 'Utilisateur' }}</p>
        <p class="mt-1 text-xs capitalize text-slate-500">{{ user?.role || 'agent' }}</p>
      </div>
      <div class="flex h-10 w-10 items-center justify-center overflow-hidden rounded-full border-2 border-white bg-primary-container text-xs font-bold text-white shadow-sm transition-all group-hover:border-primary">
        {{ (user?.fullName || 'U').charAt(0) | uppercase }}
      </div>
    </div>
  </div>
</header>

<main class="ml-64 min-h-screen bg-background px-8 pb-12 pt-24 text-on-background">
  <router-outlet></router-outlet>
</main>
