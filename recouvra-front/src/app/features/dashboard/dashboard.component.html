<main class="min-h-screen bg-surface p-6 md:p-10">
  <section class="mx-auto max-w-5xl rounded-xl bg-surface-container-lowest p-6 shadow-lg md:p-10">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
      <div>
        <p class="text-sm uppercase tracking-wider text-outline">Espace sécurisé</p>
        <h1 class="mt-1 text-3xl font-extrabold text-on-surface">Dashboard Recouvra</h1>
      </div>
      <button
        type="button"
        class="rounded-full bg-primary px-5 py-3 font-semibold text-on-primary transition-opacity hover:opacity-90"
        (click)="logout()"
      >
        Se déconnecter
      </button>
    </div>

    <div class="mt-8 rounded-lg bg-surface-container p-6">
      <h2 class="text-lg font-bold text-on-surface">Profil connecté</h2>
      <p class="mt-3 text-on-surface-variant">
        <strong>Nom:</strong>
        {{ user?.fullName || '-' }}
      </p>
      <p class="mt-2 text-on-surface-variant">
        <strong>Email:</strong>
        {{ user?.email || '-' }}
      </p>
      <p class="mt-2 text-on-surface-variant">
        <strong>Role:</strong>
        {{ user?.role || '-' }}
      </p>
    </div>
  </section>
</main>
